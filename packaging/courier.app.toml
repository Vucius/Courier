[application]
name = "Courier"
bundle_identifier = "dev.hephaestus.courier"
publisher = "Hephaestus"
summary = "Local-first desktop email client"
binary = "courier-ui"
license = "MIT"

[runtime]
data_dir_name = ".courier"
database_file = "courier.db"
minimum_config_schema = 1
minimum_database_schema = 3

[icons]
source_svg = "packaging/icons/courier.svg"
windows_ico = "packaging/icons/courier.ico"
macos_icns = "packaging/icons/courier.icns"
linux_png = "packaging/icons/courier.png"

[windows]
installer = "msi"
installer_metadata = "packaging/installers/courier.installers.toml"
upgrade_code = "00000000-0000-0000-0000-000000000000"
install_scope = "perUser"

[linux]
installer_metadata = "packaging/installers/courier.installers.toml"
desktop_file = "dev.hephaestus.courier.desktop"
categories = ["Network", "Email"]

[macos]
installer_metadata = "packaging/installers/courier.installers.toml"
bundle_name = "Courier.app"
category = "public.app-category.productivity"
