name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build release desktop binary
        run: cargo build -p courier-ui --release --locked

      - name: Verify release smoke metadata
        shell: pwsh
        run: ./packaging/verify-release-smoke.ps1

      - name: Stage release metadata
        shell: bash
        run: |
          mkdir -p target/release/package
          cp packaging/courier.app.toml target/release/package/
          cp packaging/release-manifest.json target/release/package/
          cp packaging/migrations.md target/release/package/
          cp packaging/verify-release-smoke.ps1 target/release/package/
          cp packaging/build-installers.ps1 target/release/package/
          cp packaging/generate-icons.ps1 target/release/package/
          mkdir -p target/release/package/installers
          cp packaging/installers/courier.installers.toml target/release/package/installers/
          mkdir -p target/release/package/icons
          cp packaging/icons/courier.svg target/release/package/icons/
          cp README.md LICENSE target/release/package/

      - name: Upload release binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: courier-ui-windows
          path: |
            target/release/courier-ui.exe
            target/release/package/**
          if-no-files-found: error

      - name: Upload release binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: courier-ui-linux
          path: |
            target/release/courier-ui
            target/release/package/**
          if-no-files-found: error
